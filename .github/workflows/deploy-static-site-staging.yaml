name: Deploy Static Site to Staging
run-name: ${{ github.actor }} is deploying the site to Staging 🚀
on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

permissions:
  id-token: write

jobs:
  Deploy-static-site:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Set up Cypress binary cache
        id: cypress-cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ github.ref_name }}-${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Cypress binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: npx cypress install

      # - name: Run tests
      #   run: pnpm test

      - name: lint
        run: pnpm lint

      - name: Build
        env:
          NEXT_PUBLIC_API_DOMAIN: ${{ vars.API_DOMAIN }}
        run: pnpm build

      - name: Upload to S3
        run: aws s3 sync ./out ${{ vars.S3_URL }} --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Run Cypress smoke tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_BASE_URL: ${{ vars.CYPRESS_BASE_URL }}
          API_DOMAIN: ${{ vars.API_DOMAIN }}
